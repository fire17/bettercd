<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" role="img" aria-label="bettercd — a better cd: zoxide-aware, auto-mkdir, with undo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f1a"/>
      <stop offset="0.55" stop-color="#101a2e"/>
      <stop offset="1" stop-color="#1a1030"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e8b84a"/>
      <stop offset="1" stop-color="#f5d67b"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5fb3e8"/>
      <stop offset="1" stop-color="#9bd1f5"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="340" fill="url(#bg)"/>
  <!-- motif: a path being walked — chevrons deepening into a directory that appears -->
  <g opacity="0.85">
    <path d="M 80 170 l 40 -34 l 0 20 l 26 0 l 0 28 l -26 0 l 0 20 z" fill="none" stroke="#2c3e5d" stroke-width="2"/>
    <text x="180" y="182" font-family="Verdana, Geneva, sans-serif" font-size="34" fill="#5fb3e8">❯</text>
    <text x="214" y="182" font-family="Verdana, Geneva, sans-serif" font-size="34" fill="#3d5578">❯</text>
    <text x="248" y="182" font-family="Verdana, Geneva, sans-serif" font-size="34" fill="#2c3e5d">❯</text>
  </g>
  <!-- sparkle cluster: the create moment -->
  <g>
    <text x="1120" y="120" font-family="Georgia, 'Times New Roman', serif" font-size="44" fill="url(#gold)">✻</text>
    <text x="1170" y="170" font-family="Georgia, 'Times New Roman', serif" font-size="26" fill="#f5d67b" opacity="0.8">✶</text>
    <text x="1096" y="196" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#e8b84a" opacity="0.6">✢</text>
    <text x="1152" y="228" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#5fb3e8" opacity="0.7">+</text>
  </g>
  <text x="320" y="150" font-family="Georgia, 'Times New Roman', serif" font-size="84" font-weight="bold" fill="url(#gold)">bettercd</text>
  <text x="324" y="196" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-style="italic" fill="#9bd1f5">cd has two answers: it works, or it wastes your time. This removes the second one.</text>
  <rect x="324" y="222" width="632" height="2" fill="url(#blue)" opacity="0.6"/>
  <text x="324" y="258" font-family="Verdana, Geneva, sans-serif" font-size="17" letter-spacing="3" fill="#8fa8c9">AUTO-MKDIR · ZOXIDE-AWARE · UNDO-CD · ✻ SPARKLE ANNOUNCE · ~25µS · 0 DEPS</text>
</svg>
