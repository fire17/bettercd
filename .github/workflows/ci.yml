name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: install zsh (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq zsh dash
      - name: shellcheck
        if: runner.os == 'Linux'
        # pinned release binary — apt's shellcheck lags and flags different
        # findings than dev machines (bit us twice: v0.3.1, v0.8.1)
        run: |
          wget -qO- https://github.com/koalaman/shellcheck/releases/download/v0.11.0/shellcheck-v0.11.0.linux.x86_64.tar.xz | tar -xJ
          ./shellcheck-v0.11.0/shellcheck -s sh bettercd.sh install.sh tests/*.sh
      - name: run tests
        run: sh tests/run.sh
